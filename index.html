<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power-up Breakout Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none; /* スマホのスクロールを防止 */
        }
        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            max-width: 100%;
            max-height: 90vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            color: white;
            font-size: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="ui-layer">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    // ゲームの設定
    let canvasWidth = window.innerWidth > 480 ? 400 : window.innerWidth - 20;
    let canvasHeight = 600;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    let score = 0;
    let gameRunning = true;

    // ボールの設定
    const initialBallRadius = 8;
    const initialBallSpeed = 3; // ボールの初期速度
    let balls = [{
        x: canvas.width / 2,
        y: canvas.height - 30,
        dx: initialBallSpeed,
        dy: -initialBallSpeed,
        radius: initialBallRadius
    }];

    // パドルの設定
    let paddleHeight = 12;
    let paddleWidth = 80;
    let paddleX = (canvas.width - paddleWidth) / 2;

    // ブロックの設定
    const brickRowCount = 8;
    const brickColumnCount = 5;
    const brickPadding = 5;
    const brickOffsetTop = 50;
    const brickOffsetLeft = 10;
    const brickWidth = (canvas.width - (brickOffsetLeft * 2) - (brickPadding * (brickColumnCount - 1))) / brickColumnCount;
    const brickHeight = 20;

    const bricks = [];
    for (let c = 0; c < brickColumnCount; c++) {
        bricks[c] = [];
        for (let r = 0; r < brickRowCount; r++) {
            // 特定のブロックにパワーアップフラグを設定
            const isPowerUpBlock = (r === 2 && c === Math.floor(brickColumnCount / 2)) || (r === 5 && c === Math.floor(brickColumnCount / 3));
            bricks[c][r] = { x: 0, y: 0, status: 1, color: `hsl(${r * 40}, 70%, 60%)`, powerUp: isPowerUpBlock ? 'multiBall' : null };
        }
    }

    // パワーアップアイテムの設定
    let powerUps = []; // 落ちてくるパワーアップアイテムを格納

    // マウス/タッチ操作
    document.addEventListener("mousemove", mouseMoveHandler, false);
    document.addEventListener("touchmove", touchMoveHandler, { passive: false });

    function mouseMoveHandler(e) {
        const relativeX = e.clientX - canvas.offsetLeft;
        if (relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth / 2;
        }
    }

    function touchMoveHandler(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const relativeX = touch.clientX - canvas.offsetLeft;
        if (relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth / 2;
        }
    }

    // ボール増殖処理
    function activateMultiBall(ballX, ballY, ballDx, ballDy) {
        // 現在のボールを元に2つの新しいボールを作成
        const newBall1 = { x: ballX, y: ballY, dx: -ballDx, dy: -ballDy, radius: initialBallRadius };
        const newBall2 = { x: ballX, y: ballY, dx: ballDx, dy: -ballDy, radius: initialBallRadius };
        balls.push(newBall1, newBall2);
    }

    // 衝突判定
    function collisionDetection() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                const b = bricks[c][r];
                if (b.status === 1) {
                    for (let i = 0; i < balls.length; i++) {
                        const ball = balls[i];
                        if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score++;
                            scoreElement.textContent = score;

                            // パワーアップブロックだった場合、アイテムを生成
                            if (b.powerUp === 'multiBall') {
                                powerUps.push({
                                    x: b.x + brickWidth / 2,
                                    y: b.y + brickHeight / 2,
                                    dy: 2, // 落ちる速度
                                    type: 'multiBall',
                                    radius: 10
                                });
                            }

                            if (score === brickRowCount * brickColumnCount) {
                                alert("おめでとう！クリアです！");
                                document.location.reload();
                            }
                        }
                    }
                }
            }
        }
    }

    function drawBall(ball) {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        ctx.beginPath();
        ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
        ctx.fillStyle = "#0095DD";
        ctx.fill();
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#0095DD";
        ctx.closePath();
        ctx.shadowBlur = 0; // 他に影響させない
    }

    function drawBricks() {
        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                if (bricks[c][r].status === 1) {
                    const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                    const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, brickHeight);
                    ctx.fillStyle = bricks[c][r].color;
                    if (bricks[c][r].powerUp) { // パワーアップブロックは色を変える
                        ctx.fillStyle = "#FFD700"; // 金色
                    }
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function drawPowerUps() {
        for (let i = 0; i < powerUps.length; i++) {
            const pu = powerUps[i];
            ctx.beginPath();
            ctx.arc(pu.x, pu.y, pu.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#00FF00"; // 緑色
            ctx.fill();
            ctx.closePath();
        }
    }

    function updatePowerUps() {
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pu = powerUps[i];
            pu.y += pu.dy;

            // パドルとの衝突判定
            if (pu.y + pu.radius > canvas.height - paddleHeight - 10 &&
                pu.y - pu.radius < canvas.height - 10 &&
                pu.x > paddleX &&
                pu.x < paddleX + paddleWidth) {
                // パワーアップ発動
                if (pu.type === 'multiBall') {
                    // 現在のボールを全て増殖させる
                    const currentBalls = [...balls];
                    for(let j = 0; j < currentBalls.length; j++) {
                        activateMultiBall(currentBalls[j].x, currentBalls[j].y, currentBalls[j].dx, currentBalls[j].dy);
                    }
                }
                powerUps.splice(i, 1); // アイテムを削除
            }

            // 画面外に出たアイテムを削除
            if (pu.y - pu.radius > canvas.height) {
                powerUps.splice(i, 1);
            }
        }
    }

    function draw() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawPaddle();
        drawPowerUps(); // パワーアップアイテムを描画

        // 各ボールの描画と更新
        for (let i = balls.length - 1; i >= 0; i--) {
            const ball = balls[i];
            drawBall(ball);
            collisionDetection(); // 各ボールで衝突判定

            // 壁との衝突
            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
            }
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
            } else if (ball.y + ball.dy > canvas.height - ball.radius - 10) {
                // パドルとの衝突
                if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
                    let collidePoint = ball.x - (paddleX + paddleWidth / 2);
                    collidePoint = collidePoint / (paddleWidth / 2);
                    let angle = collidePoint * (Math.PI / 3);

                    ball.dx = 5 * Math.sin(angle);
                    ball.dy = -5 * Math.cos(angle);
                } else if (ball.y + ball.dy > canvas.height) {
                    // ボールが画面下部に落ちた
                    balls.splice(i, 1); // ボールを削除
                    if (balls.length === 0) { // 全てのボールがなくなったらゲームオーバー
                        gameRunning = false;
                        alert("ゲームオーバー！ Score: " + score);
                        document.location.reload();
                    }
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;
        }

        updatePowerUps(); // パワーアップアイテムを更新
        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
